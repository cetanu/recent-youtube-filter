<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recent YouTube Filter</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <form id="options-form">
      <label for="max-age-days">Hide videos older than</label>
      <div class="field-row">
        <input id="max-age-days" name="maxAgeDays" type="number" min="0" max="3650" step="1" required>
        <span>days</span>
      </div>
      <button type="submit">Save</button>
      <p id="status" role="status"></p>
    </form>
    <script src="options.js"></script>
  </body>
</html>
